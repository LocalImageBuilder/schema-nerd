name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p build/schema-nerd
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            ./ build/schema-nerd/
          cd build && zip -r schema-nerd.zip schema-nerd

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/schema-nerd.zip
          generate_release_notes: true
